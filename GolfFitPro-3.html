*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#0d0d1a;--surface:#13131f;--surface2:#1a1a2e;--border:#2a2a3e;
  --green:#4ade80;--green-dim:#22c55e;--text:#f0f0f0;--muted:#6b7280;
  --red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;display:flex;flex-direction:column;position:relative}
h1,h2,h3,.bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}

/* HEADER */
.header{background:var(--surface);padding:env(safe-area-inset-top,14px) 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;padding-top:calc(env(safe-area-inset-top,0px) + 14px)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);letter-spacing:.1em}
.streak-badge{background:linear-gradient(135deg,var(--green),var(--green-dim));color:#0d0d1a;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif}

/* DAY TABS */
.day-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.04em}
.day-tab.active{background:var(--green);color:#0d0d1a;border-color:var(--green)}
.day-tab.has-data{border-color:var(--green-dim);color:var(--green-dim)}
.day-tab.active.has-data{background:var(--green);color:#0d0d1a}

/* SCROLL AREA */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.scroll-area::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;padding:10px 4px 8px;background:transparent;border:none;color:var(--muted);font-size:9px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.05em;text-transform:uppercase;transition:.15s}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:19px;line-height:1}

/* PROGRESS */
.progress-wrap{padding:8px 16px 4px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green-dim),var(--green));border-radius:3px;transition:.4s ease}

/* DAY HEADER */
.day-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);padding:14px 16px 4px;letter-spacing:.06em}
.day-type-badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700;margin:0 16px 8px;letter-spacing:.05em}
.day-intro{margin:4px 16px 12px;background:var(--surface2);border-radius:10px;padding:10px 12px;border-left:3px solid var(--green);font-size:12px;color:var(--muted);line-height:1.6}

/* SECTION */
.section{margin:0 16px 12px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.section-header{background:var(--surface2);padding:8px 12px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;color:var(--muted)}

/* EXERCISE ROW */
.ex-row{display:flex;align-items:flex-start;padding:11px 12px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:.1s;user-select:none}
.ex-row:last-child{border-bottom:none}
.ex-row:active{background:var(--surface2)}
.ex-row.done{opacity:.45}
.check-box{width:23px;height:23px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s;margin-top:1px}
.ex-row.done .check-box{background:var(--green);border-color:var(--green);color:#0d0d1a;font-weight:900}
.ex-info{flex:1;min-width:0}
.ex-tag{font-size:10px;color:var(--green);font-weight:700;margin-bottom:2px;letter-spacing:.03em}
.ex-name{font-size:13px;font-weight:600;line-height:1.3}
.ex-meta{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.ex-warn{font-size:10px;color:var(--red);margin-top:2px;line-height:1.4}
.ex-logged{font-size:11px;color:var(--green);margin-top:2px;font-weight:600}
.log-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:7px;font-size:10px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;margin-top:1px;letter-spacing:.03em;transition:.15s}
.log-btn:active{background:var(--border)}

/* NOTES */
.notes-wrap{margin:0 16px 14px}
.notes-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.05em}
.notes-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;min-height:70px;line-height:1.5}
.notes-input:focus{outline:none;border-color:var(--green)}

/* SUPPS */
.supp-card{margin:8px 16px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.supp-header{background:var(--surface2);padding:9px 12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.08em;color:var(--green)}
.supp-row{display:flex;align-items:flex-start;padding:11px 12px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:.1s}
.supp-row:last-child{border-bottom:none}
.supp-row:active{background:var(--surface2)}
.supp-row.taken{opacity:.4}
.supp-info{flex:1}
.supp-name{font-size:13px;font-weight:600}
.supp-note{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5}
.medical-note{margin:8px 16px 16px;font-size:10px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--red)}

/* HISTORY */
.hist-empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;line-height:1.8}
.hist-card{margin:8px 16px;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.hist-header{background:var(--surface2);padding:11px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hist-date{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.05em}
.hist-meta{font-size:11px;color:var(--muted)}
.hist-body{padding:10px 12px;font-size:12px;color:var(--muted);line-height:1.7;border-top:1px solid var(--border)}
.hist-ex{display:flex;gap:6px;align-items:baseline}
.hist-note{margin-top:7px;font-style:italic;color:var(--blue);font-size:11px;padding-top:7px;border-top:1px solid var(--border)}

/* EXPORT */
.export-card{margin:10px 16px;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.export-card-header{background:var(--surface2);padding:9px 12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.08em;color:var(--yellow)}
.export-body{padding:14px}
.export-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:10px 16px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:.15s;letter-spacing:.04em}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#0d0d1a}
.btn-yellow{background:var(--yellow);color:#0d0d1a}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-red{background:var(--red);color:#0d0d1a}
.export-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--muted);font-size:11px;font-family:monospace;resize:none;min-height:140px;line-height:1.6;margin-top:12px}
.export-textarea:focus{outline:none}
.copy-msg{font-size:11px;font-weight:700;text-align:center;margin-top:8px;min-height:18px;color:var(--green)}
.export-hint{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6;padding:10px;background:var(--surface2);border-radius:8px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom,0px));border-top:2px solid var(--green)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:16px;letter-spacing:.06em}
.modal-field{margin-bottom:12px}
.modal-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;letter-spacing:.05em}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px}
.modal-input:focus{outline:none;border-color:var(--green)}

/* STATS */
.stats-row{display:flex;gap:8px;margin:10px 16px}
.stat-box{flex:1;background:var(--surface2);border-radius:10px;padding:10px;border:1px solid var(--border);text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green)}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin-top:2px}

/* SECTION DIVIDER */
.section-divider{margin:4px 16px 0;font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--muted);letter-spacing:.1em;padding:6px 0 2px}
</style>
</head>

</div>

// ─── DATE HELPERS ─────────────────────────────────────────
function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function checkKey(exId){ return `${todayKey()}_${exId}`; }
function suppKey(sid){ return `${todayKey()}_${sid}`; }

// ─── STREAK ───────────────────────────────────────────────
function getStreak(){
  const dates = [...new Set(Object.keys(workoutChecks).map(k=>k.slice(0,10)))].sort().reverse();
  if(!dates.length) return 0;
  let streak=0, ref=new Date(); ref.setHours(0,0,0,0);
  for(const d of dates){
    const dt=new Date(d+'T12:00:00');
    const diff=Math.round((ref-dt)/86400000);
    if(diff<=1){streak++;ref=dt;}else break;
  }
  return streak;
}

function getDayProgress(){
  const day=PROGRAM[currentDay]; let total=0,done=0;
  for(const s of day.sections) for(const e of s.exercises){total++;if(workoutChecks[checkKey(e.id)])done++;}
  return{total,done};
}

function renderDayTabs(){
  const today=todayKey();
  document.getElementById('dayTabs').innerHTML=DAY_NAMES.map((n,i)=>{
    const hasToday=PROGRAM[i].sections.some(s=>s.exercises.some(e=>workoutChecks[`${today}_${e.id}`]));
    let cls='day-tab';
    if(i===currentDay) cls+=' active';
    else if(hasToday) cls+=' has-data';
    return `<button class="${cls}" onclick="selectDay(${i})">${n}</button>`;
  }).join('');
  document.getElementById('streakBadge').textContent=`🔥 ${getStreak()} Day Streak`;
}

function renderWorkout(){
  const day=PROGRAM[currentDay];
  const{total,done}=getDayProgress();

  let html=`
    <div class="day-title">${DAY_LABELS[currentDay]}</div>
    <span class="day-type-badge" style="background:${DAY_COLORS[currentDay]}22;color:${DAY_COLORS[currentDay]};border:1px solid ${DAY_COLORS[currentDay]}44">${DAY_TYPES[currentDay]}</span>

      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="day-intro">${day.intro}</div>`;

  for(const sec of day.sections){
    html+=`<div class="section"><div class="section-header">${sec.title}</div>`;

      const done=!!workoutChecks[checkKey(ex.id)];

function renderHistory(){
  // Build date map from all stored data
  const map={};

    ...Object.keys(workoutChecks).map(k=>k.slice(0,10)),
    ...Object.keys(workoutLogs).map(k=>k.slice(0,10))
  ]);
  for(const date of allDates){
    const js=new Date(date+'T12:00:00').getDay();
    const di=(js+6)%7;
    const exDone=[];
    const logs=[];
    for(const sec of PROGRAM[di].sections){
      for(const ex of sec.exercises){
        if(workoutChecks[`${date}_${ex.id}`]) exDone.push(ex.name);
        const lg=workoutLogs[`${date}_${ex.id}`];
        if(lg) logs.push(`${ex.name}: ${lg.sets}×${lg.reps} @ ${lg.weight}lbs`);

    }
    const note=sessionNotes[`${date}_${di}`];
    map[date]={di,dayLabel:DAY_LABELS[di],dayType:DAY_TYPES[di],color:DAY_COLORS[di],exDone,logs,note};
  }

  const sorted=Object.keys(map).sort().reverse();
  if(!sorted.length){
    document.getElementById('mainContent').innerHTML=`<div class="hist-empty">No workout history yet.<br><br>Complete exercises on the Workout tab<br>to start building your log.</div>`;
    return;
  }

  // Stats summary
  const totalDays=sorted.length;
  const totalEx=Object.keys(workoutChecks).length;
  let html=`<div class="stats-row">
    <div class="stat-box"><div class="stat-num">${getStreak()}</div><div class="stat-label">Day Streak</div></div>
    <div class="stat-box"><div class="stat-num">${totalDays}</div><div class="stat-label">Days Logged</div></div>
    <div class="stat-box"><div class="stat-num">${totalEx}</div><div class="stat-label">Exercises Done</div></div>
  </div>`;

  for(const date of sorted){
    const d=map[date];
    const exp=expandedHist[date];
    html+=`<div class="hist-card">
      <div class="hist-header" onclick="toggleHist('${date}')">
        <div>
          <div class="hist-date">${date}</div>
          <div class="hist-meta" style="color:${d.color}">${d.dayLabel} · ${d.dayType}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <div class="hist-meta">${d.exDone.length} done · ${d.logs.length} logged</div>
          <div style="font-size:16px">${exp?'▲':'▼'}</div>
        </div>
      </div>
      ${exp?`<div class="hist-body">
        ${d.exDone.map(n=>`<div class="hist-ex"><span style="color:var(--green)">✓</span> ${n}</div>`).join('')}
        ${d.logs.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:4px">LOGGED WEIGHTS</div>${d.logs.map(l=>`<div class="hist-ex" style="color:var(--green)">📝 ${l}</div>`).join('')}</div>`:''}
        ${d.note?`<div class="hist-note">"${d.note}"</div>`:''}
      </div>`:''}
    </div>`;
  }
  document.getElementById('mainContent').innerHTML=html;
  document.getElementById('scrollArea').scrollTop=0;
}

function generateExport(){
  const today=new Date(); const todayStr=todayKey();
  // Last 14 days
  const cutoff=new Date(today); cutoff.setDate(cutoff.getDate()-14);
  const map={};
  for(const key of Object.keys(workoutChecks)){
    const date=key.slice(0,10);
    if(new Date(date+'T12:00:00')<cutoff) continue;
    if(!map[date]) map[date]={exIds:[],logs:[],note:null};
    map[date].exIds.push(key.slice(11));
  }
  for(const key of Object.keys(workoutLogs)){
    const date=key.slice(0,10);
    if(!map[date]) continue;
    const exId=key.slice(11); const lg=workoutLogs[key];
    let name=exId;
    for(const day of Object.values(PROGRAM)) for(const sec of day.sections){
      const ex=sec.exercises.find(e=>e.id===exId); if(ex) name=ex.name;
    }
    map[date].logs.push(`${name}: ${lg.sets}×${lg.reps} @ ${lg.weight}lbs`);
  }
  for(const key of Object.keys(sessionNotes)){
    const date=key.slice(0,10);
    if(map[date]&&sessionNotes[key]) map[date].note=sessionNotes[key];
  }

  const suppToday=[];
  for(const g of[SUPPS.morning,SUPPS.preWorkout,SUPPS.evening]) for(const s of g){
    if(suppChecks[suppKey(s.id)]) suppToday.push(s.name.split('—')[0].trim());
  }

  const sorted=Object.keys(map).sort().reverse();
  const lines=[];
  lines.push('=== GOLF FIT PRO — CLAUDE EXPORT ===');
  lines.push(`Generated: ${todayStr} | Streak: ${getStreak()} days`);
  lines.push('');
  lines.push('PROFILE:');
  lines.push('  Age: 49 | Weight: 163 lbs | Location: Orlando, FL');
  lines.push('  Right shoulder pain (uncleared — no overhead pressing until physician clears)');
  lines.push('  Knee history — TKE daily, pain-free depth only on all lower body');
  lines.push('  Sat + Sun: Golf rounds (year-round)');
  lines.push('  Equipment: Centr 3 cable trainer, spin bike, resistance bands, med balls');
  lines.push('  Recovery: Infrared sauna + compression boots');
  lines.push('  Medication: Losartan 50mg daily (hypertension)');
  lines.push('');
  lines.push(`TODAY'S SUPPLEMENTS:`);
  lines.push(suppToday.length?`  Taken: ${suppToday.join(', ')}`:'  None logged yet today');
  lines.push('');
  if(!sorted.length){
    lines.push('WORKOUT LOG: No data in last 14 days.');
  } else {
    lines.push(`WORKOUT LOG (last 14 days — ${sorted.length} days recorded):`);
    for(const date of sorted){
      const d=map[date];
      const js=new Date(date+'T12:00:00').getDay();
      const di=(js+6)%7;
      lines.push(`\n  ${date} — ${DAY_LABELS[di]} (${DAY_TYPES[di]})`);
      lines.push(`  Exercises completed: ${d.exIds.length}`);
      if(d.logs.length){lines.push('  Weights logged:');d.logs.forEach(l=>lines.push(`    • ${l}`));}
      if(d.note) lines.push(`  Note: "${d.note}"`);
    }
  }
  lines.push('');
  lines.push('PROGRAM RULES (for Claude):');
  lines.push('  • No overhead pressing — right shoulder uncleared');
  lines.push('  • Centr 3 cable machine preferred over dumbbells/barbells');
  lines.push('  • TKE every single day for knee maintenance');
  lines.push('  • Face pulls every upper body session');
  lines.push('  • Prone Y/T/W replaces wall slides (shoulder irritation)');
  lines.push('  • Step-back lunges only — skip if knee protests, sub RDL');
  lines.push('  • Ashwagandha may have additive BP effect with Losartan — monitor');
  lines.push('=== END EXPORT ===');

  document.getElementById('exportBox').value=lines.join('\n');
}

function copyExport(){
  const txt=document.getElementById('exportBox').value;
  if(!txt||txt.startsWith('Tap')){document.getElementById('copyMsg').textContent='Generate a snapshot first.';return;}
  const msg=document.getElementById('copyMsg');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      msg.textContent='✓ Copied! Paste into Claude.';
      setTimeout(()=>{msg.textContent=''},3500);
    }).catch(()=>fallbackCopy(txt,msg));
  } else { fallbackCopy(txt,msg); }
}
function fallbackCopy(txt,msg){
  const ta=document.getElementById('exportBox');
  ta.removeAttribute('readonly'); ta.select(); ta.setSelectionRange(0,9999);
  try{document.execCommand('copy');msg.textContent='✓ Copied!';}catch(e){msg.textContent='Select all text above and copy manually.';}
  ta.setAttribute('readonly','');
  setTimeout(()=>{msg.textContent=''},3500);
}
function clearExportBox(){const el=document.getElementById('exportBox');if(el)el.value='';}

function exportJSON(){
  const data={workoutChecks,workoutLogs,suppChecks,sessionNotes,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`GolfFitPro_backup_${todayKey()}.json`; a.click();
  URL.revokeObjectURL(url);
}

function toggleEx(exId){
  const k=checkKey(exId);
  if(workoutChecks[k]) delete workoutChecks[k]; else workoutChecks[k]=true;
  saveAll(); renderDayTabs(); renderWorkout();
}
function toggleSupp(sid){
  const k=suppKey(sid);
  if(suppChecks[k]) delete suppChecks[k]; else suppChecks[k]=true;
  saveAll(); renderSupps();
}
function toggleHist(date){expandedHist[date]=!expandedHist[date];renderHistory();}

function openLog(e,exId,name){
  e.stopPropagation(); logTargetId=exId;
  const ex=workoutLogs[checkKey(exId)];
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('logSets').value=ex?.sets||'';
  document.getElementById('logReps').value=ex?.reps||'';
  document.getElementById('logWeight').value=ex?.weight||'';
  document.getElementById('logModal').style.display='flex';
  setTimeout(()=>document.getElementById('logSets').focus(),100);
}
function saveLog(){
  if(!logTargetId) return;
  workoutLogs[checkKey(logTargetId)]={
    sets:document.getElementById('logSets').value,
    reps:document.getElementById('logReps').value,
    weight:document.getElementById('logWeight').value
  };
  workoutChecks[checkKey(logTargetId)]=true;
  saveAll(); closeModal(); renderDayTabs(); renderWorkout();
}
function closeModal(){document.getElementById('logModal').style.display='none';logTargetId=null;}
function overlayClose(e){if(e.target===document.getElementById('logModal'))closeModal();}

function saveNote(){
  const nk=`${todayKey()}_${currentDay}`;
  sessionNotes[nk]=document.getElementById('notesInput')?.value||'';
  saveAll();
}

function selectDay(i){
  currentDay=i; renderDayTabs();
  if(currentTab==='workout') renderWorkout();
}
function switchTab(tab){
  currentTab=tab;
  ['workout','supps','history','export'].forEach(t=>{
    const el=document.getElementById('nav'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.toggle('active',t===tab);
  });
  if(tab==='workout') renderWorkout();
  else if(tab==='supps') renderSupps();
  else if(tab==='history') renderHistory();
  else if(tab==='export') renderExport();
}

// ─── KEYBOARD close on Enter for modal ───────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('logModal').style.display!=='none'){
    const active=document.activeElement;
    if(active&&active.classList.contains('modal-input')) saveLog();
  }
  if(e.key==='Escape') closeModal();
});

// ─── PWA INSTALL PROMPT ───────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = `
    position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
    width:calc(100% - 32px);max-width:448px;
    background:linear-gradient(135deg,#1a2e1a,#0d1f0d);
    border:1px solid var(--green);border-radius:12px;
    padding:12px 14px;display:flex;align-items:center;gap:10px;
    z-index:150;box-shadow:0 4px 24px rgba(74,222,128,.2)`;
  banner.innerHTML = `
    <span style="font-size:22px">⛳</span>
    <div style="flex:1">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--green);letter-spacing:.05em">ADD TO HOME SCREEN</div>
      <div style="font-size:11px;color:var(--muted);margin-top:1px">Install Golf Fit Pro as an app</div>
    </div>
    <button onclick="doInstall()" style="background:var(--green);color:#0d0d1a;border:none;padding:8px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer">Install</button>
    <button onclick="dismissInstall()" style="background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0 4px">×</button>`;
  document.body.appendChild(banner);
}

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    deferredPrompt = null;
    dismissInstall();
  });
}

function dismissInstall() {
  const b = document.getElementById('installBanner');
  if (b) b.remove();
}

// Register service worker for offline use
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'golfitpro-v1';
    const ASSETS = ['/'];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ─── INIT ─────────────────────────────────────────────────
loadAll();
renderDayTabs();
renderWorkout();
</script>
</body>
